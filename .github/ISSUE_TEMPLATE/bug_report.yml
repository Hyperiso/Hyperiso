name: Bug report
description: Report a reproducible software bug
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - C++ core
        - Python bindings
        - CLI
        - Dash GUI
        - Build/CI
        - Documentation
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler, CMake, Python, HyperIso commit/tag and build flags.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
