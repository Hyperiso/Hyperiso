name: Documentation issue
description: Report unclear, missing or incorrect documentation
title: "[Docs]: "
labels: [documentation, needs-triage]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: README.md, examples_python/README.md, docs/installation.md, etc.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
