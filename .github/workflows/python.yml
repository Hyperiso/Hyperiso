name: Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libgsl-dev

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip build pytest
          python -m pip install -e ./Hyperiso/Hyperiso

      - name: Import smoke test
        run: |
          python - <<'PY'
          import pyhyperiso
          print('pyhyperiso import OK')
          PY

      - name: Run Python tests
        run: pytest Hyperiso/Hyperiso/pyhyperiso/test -q

      - name: Build source distribution and wheel
        run: python -m build ./Hyperiso/Hyperiso
